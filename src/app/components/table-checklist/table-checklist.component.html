<div class="checklist-table">
  <table class="table">
    <thead>
      <tr>
        <th class="number">N°</th>
        <th class="piece">PEÇA</th>
        <th class="nothing"></th>
        <th class="classification" colspan="3">CLASSIFICAÇÃO</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let info of vehicle">
        <td>
          <p>{{ info.numberId }}</p>
        </td>
        <td>
          <p>{{ info.pieceName }}</p>
        </td>
        <td>???</td>
        <td class="table-btn"><button>Sem Danos</button></td>
        <td class="table-btn"><button>Peça Danificada</button></td>
        <td class="table-btn"><button>Não Avaliada</button></td>
      </tr>
    </tbody>
  </table>
</div>
